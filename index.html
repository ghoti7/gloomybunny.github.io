<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner (Back Camera + Flash)</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #reader {
      width: 320px;
      margin: 20px auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
      word-break: break-word;
    }

    button {
      margin: 8px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

  <h1>QR Code Scanner</h1>

  <div id="reader"></div>
  <div id="result">Ready to scan...</div>

  <div>
    <button onclick="startScanner()">Start</button>
    <button onclick="stopScanner()">Stop</button>
    <button onclick="toggleFlash()" id="flashBtn">Flash ON</button>
  </div>

  <script>
    let html5QrCode;
    let flashOn = false;
    const qrConfig = { fps: 10, qrbox: 250 };

    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = "Scanned: " + decodedText;
    }

    function onScanError(errorMessage) {
      console.warn(errorMessage);
    }

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      flashOn = false;
      updateFlashButton();

      html5QrCode.start(
        { facingMode: "environment" },
        qrConfig,
        onScanSuccess,
        onScanError
      ).catch(err => {
        document.getElementById("result").innerText = "Camera error: " + err;
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          document.getElementById("result").innerText = "Scanner stopped.";
          html5QrCode = null;
        }).catch(err => {
          console.error("Stop failed:", err);
        });
      }
    }

    function toggleFlash() {
      if (!html5QrCode) return;

      html5QrCode.getRunningTrackCapabilities()
        .then(capabilities => {
          if (!capabilities.torch) {
            alert("Flashlight not supported on this device");
            return;
          }

          return html5QrCode.applyVideoConstraints({
            advanced: [{ torch: !flashOn }]
          });
        })
        .then(() => {
          flashOn = !flashOn;
          updateFlashButton();
        })
        .catch(err => {
          console.error("Torch error:", err);
        });
    }

    function updateFlashButton() {
      const btn = document.getElementById("flashBtn");
      btn.innerText = flashOn ? "Flash OFF" : "Flash ON";
    }
  </script>

</body>
</html>
